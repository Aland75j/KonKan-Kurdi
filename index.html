<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>کۆنکان - شای یارییەکان</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #0b0c10;
            font-family: 'Noto Sans Arabic', sans-serif;
            user-select: none; -webkit-user-select: none;
        }

        /* Force Landscape Layout Container on Screen Ratio Multipliers */
        #orientation-wrapper {
            width: 100vw; height: 100vh;
            position: absolute; top: 0; left: 0;
            transition: all 0.3s ease-in-out;
        }

        /* Smart CSS Landscape Virtualizer Forcing 90deg view shifts */
        @media (orientation: portrait) {
            #orientation-wrapper {
                width: 100vh; height: 100vw;
                transform: rotate(90deg);
                transform-origin: top left;
                position: absolute; top: 0; left: 100%;
            }
        }

        .shake-rack { animation: hardwareShiver 0.15s linear infinite; }
        @keyframes hardwareShiver {
            0% { transform: translate3d(-6px, 0, 0); }
            50% { transform: translate3d(6px, 0, 0); }
            100% { transform: translate3d(0, 0, 0); }
        }
        .glass-panel {
            background: rgba(31, 40, 51, 0.65);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(197, 160, 89, 0.2);
        }
    </style>
</head>
<body class="relative bg-[#0b0c10]">

    <!-- START INTERACTION/BLACK SCREEN BYPASS TAP OVERLAY -->
    <div id="tap-to-start" class="fixed inset-0 bg-[#0b0c10] z-[99999] flex flex-col justify-center items-center cursor-pointer text-center p-4">
        <div class="w-20 h-20 bg-gradient-to-tr from-[#c5a059] to-yellow-600 rounded-full flex items-center justify-center text-white text-3xl animate-pulse shadow-lg shadow-[#c5a059]/20 mb-4">▶</div>
        <h1 class="text-2xl font-black text-[#c5a059] mb-1">کۆنکان - شای یارییەکان</h1>
        <p class="text-gray-400 text-xs">بۆ دەستپێکردنی بڕینی سینەمایی یارییەکە، کلیک بکە 👆</p>
    </div>

    <!-- VIRTUAL ROTATION MATRIX WRAPPER -->
    <div id="orientation-wrapper" class="relative overflow-hidden">
        <canvas id="game-canvas" class="absolute inset-0 w-full h-full z-0"></canvas>

        <div id="ui-layer" class="absolute inset-0 w-full h-full z-10 pointer-events-none flex flex-col justify-between p-4 hidden">
            <!-- HUD TOP -->
            <div id="hud-top" class="w-full flex justify-between items-center pointer-events-auto">
                <div class="glass-panel rounded-xl p-2 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full border border-[#c5a059] overflow-hidden bg-gray-800">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Spectre" class="w-full h-full">
                    </div>
                    <div>
                        <div class="text-xs font-bold text-white">مۆحەمەد عەبدوڵا <span class="text-[10px] bg-[#c5a059] text-black px-1 rounded">وەستا</span></div>
                        <div class="w-20 bg-gray-900 h-1.5 rounded-full mt-1"><div class="bg-blue-500 h-full w-[75%]"></div></div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="glass-panel px-3 py-1 rounded-full text-white text-xs font-bold"><span id="coin-count">🪙 ٠</span></div>
                </div>
            </div>

            <!-- HUD CENTER -->
            <div id="hud-center" class="w-full flex justify-center items-center pointer-events-auto my-auto">
                <div id="lobby-menu" class="flex gap-4">
                    <button onclick="GameEngine.startMatch()" class="glass-panel px-6 py-3 rounded-xl text-[#c5a059] font-black text-sm hover:scale-105 active:scale-95 transition-all cursor-pointer">▶ دەستپێکردنی یاری کۆنکان</button>
                </div>
            </div>

            <!-- ILLEGAL ACTION POPUP NOTIFICATION -->
            <div id="punishment-banner" class="absolute top-1/4 left-1/2 transform -translate-x-1/2 glass-panel bg-black/90 text-center px-6 py-3 rounded-xl opacity-0 transition-all duration-300 z-50 max-w-xs pointer-events-none">
                <span class="text-2xl mb-1 block" id="warning-icon">⚠️</span>
                <p class="text-xs text-red-400 font-bold" id="warning-text"></p>
            </div>

            <!-- HUD BOTTOM -->
            <div id="hud-bottom" class="w-full flex justify-between items-end">
                <button onclick="GameEngine.toggleChatWheel()" class="glass-panel p-2 rounded-full text-white pointer-events-auto cursor-pointer">💬</button>
                <div id="chat-wheel" class="absolute bottom-16 right-4 glass-panel p-2 rounded-xl hidden w-56 flex flex-col gap-1 z-30 pointer-events-auto">
                    <button onclick="GameEngine.sendPhrase(0)" class="w-full text-right p-1.5 text-white text-[11px] rounded hover:bg-white/10">"دەی خێراکە براڕۆ، سەعات بوو!"</button>
                    <button onclick="GameEngine.sendPhrase(1)" class="w-full text-right p-1.5 text-white text-[11px] rounded hover:bg-white/10">"دەستت قوفڵ بووە بە دیاریا؟ 🤫"</button>
                </div>
                <div id="sorting-controls" class="flex gap-2 pointer-events-auto hidden">
                    <button onclick="GameEngine.sortHand('color')" class="glass-panel px-3 py-1.5 text-[11px] text-white rounded-lg">ڕێکخستن بەپێی ڕەنگ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
