<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konkan Ultimate V2+</title>

<style>
/* ===== GLOBAL ===== */
body{
  margin:0;
  background:radial-gradient(circle at center,#0b2a17,#04140c);
  font-family:sans-serif;
  overflow:hidden;
  user-select:none;
}

/* ===== BOARD ===== */
#board{
  position:absolute;
  inset:0;
}

/* ===== DISCARD ===== */
#discard{
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  width:110px;
  height:130px;
  border:2px dashed #ffd700;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ffd700;
  font-weight:bold;
  opacity:.8;
}

/* ===== RACK ===== */
#rack{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:6px;
  padding:10px;
}

/* ===== TILE ===== */
.tile{
  width:60px;
  height:80px;
  background:white;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:bold;
  position:relative;
  touch-action:none;
  will-change:transform;
  transition:box-shadow .2s;
}

/* STATES */
.tile.grab{ box-shadow:0 0 18px #2effa0; }
.tile.valid{ box-shadow:0 0 18px #00ffcc; }
.tile.bad{ box-shadow:0 0 18px red; }

/* subtle hover */
.tile:hover{
  transform:translateY(-4px);
}

/* turn glow */
#turnIndicator{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  color:#00ffcc;
  font-weight:bold;
}
</style>

</head>

<body>

<div id="board"></div>
<div id="discard">DROP</div>
<div id="turnIndicator">YOUR TURN</div>
<div id="rack"></div>

<script>
/* =========================
   CORE ENGINE
========================= */

const Game = {
  drag:null,
  offsetX:0,
  offsetY:0,
  snap:null,
  tiles:[],
  turn:true
};

/* =========================
   INIT GAME
========================= */

const rack = document.getElementById("rack");

function init(){
  for(let i=1;i<=10;i++){
    const tile = createTile(i);
    rack.appendChild(tile);
    Game.tiles.push(tile);
  }

  startLoop();
}

init();

/* =========================
   CREATE TILE
========================= */

function createTile(num){
  const t = document.createElement("div");
  t.className="tile";
  t.textContent=num;

  enableDrag(t);

  return t;
}

/* =========================
   DRAG SYSTEM (FAST)
========================= */

function enableDrag(tile){

tile.addEventListener("pointerdown",e=>{
  if(!Game.turn) return;

  Game.drag = tile;
  tile.classList.add("grab");

  const r = tile.getBoundingClientRect();
  Game.offsetX = e.clientX - r.left;
  Game.offsetY = e.clientY - r.top;

  tile.style.position="fixed";
  tile.style.zIndex=999;
});

/* MOVE */
document.addEventListener("pointermove",e=>{
  if(!Game.drag) return;

  const x = e.clientX - Game.offsetX;
  const y = e.clientY - Game.offsetY;

  Game.drag.style.transform =
    `translate(${x}px,${y}px) rotate(${(x%10)-5}deg)`;

  detectSnap(e.clientX,e.clientY);
});

/* RELEASE */
document.addEventListener("pointerup",()=>{
  if(!Game.drag) return;

  if(Game.snap){
    dropTile(Game.drag,Game.snap);
    feedback(Game.drag,true);
    endTurn();
  }else{
    resetTile(Game.drag);
    feedback(Game.drag,false);
  }

  Game.drag.classList.remove("grab");
  Game.drag=null;
  Game.snap=null;
});

}

/* =========================
   SNAP DETECTION
========================= */

function detectSnap(x,y){
  const d = document.getElementById("discard");
  const r = d.getBoundingClientRect();

  if(x>r.left && x<r.right && y>r.top && y<r.bottom){
    Game.snap = d;
  }else{
    Game.snap = null;
  }
}

/* =========================
   DROP
========================= */

function dropTile(tile,target){
  target.appendChild(tile);

  tile.style.position="relative";
  tile.style.transform="none";
}

/* =========================
   RESET
========================= */

function resetTile(tile){
  rack.appendChild(tile);
  tile.style.position="relative";
  tile.style.transform="none";
}

/* =========================
   FEEDBACK
========================= */

function feedback(tile,ok){
  tile.classList.remove("valid","bad");

  if(ok){
    tile.classList.add("valid");
    setTimeout(()=>tile.classList.remove("valid"),300);
  }else{
    tile.classList.add("bad");
    tile.animate([
      {transform:'translateX(0)'},
      {transform:'translateX(-6px)'},
      {transform:'translateX(6px)'},
      {transform:'translateX(0)'}
    ],{duration:200});
    setTimeout(()=>tile.classList.remove("bad"),300);
  }
}

/* =========================
   TURN SYSTEM
========================= */

function endTurn(){
  Game.turn = false;
  document.getElementById("turnIndicator").textContent="OPPONENT...";
  
  setTimeout(()=>{
    aiTurn();
  },700);
}

/* =========================
   SIMPLE AI (FAKE PLAYER)
========================= */

function aiTurn(){
  // simulate opponent discard
  document.getElementById("turnIndicator").textContent="YOUR TURN";
  Game.turn = true;
}

/* =========================
   GAME LOOP
========================= */

function startLoop(){
  requestAnimationFrame(startLoop);
}

/* =========================
   SMART ASSIST (MINIMAL)
========================= */

function highlight(){
  Game.tiles.forEach(t=>{
    if(parseInt(t.textContent)%2===0){
      t.classList.add("valid");
    }else{
      t.classList.remove("valid");
    }
  });
}

setInterval(highlight,2000);

</script>

</body>
</html>
